services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: hospitality
      POSTGRES_PASSWORD: hospitality
      POSTGRES_DB: hospitality
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://hospitality:hospitality@db:5432/hospitality
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
    depends_on:
      - db
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
