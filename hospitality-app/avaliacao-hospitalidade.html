<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avaliação de Hospitalidade — Dawson, Abbott &amp; Shoemaker (2011)</title>
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f8fafc; --surface: #ffffff; --border: #e2e8f0;
  --text: #0f172a; --muted: #64748b; --accent: #2563eb;
  --accent-light: #eff6ff; --radius: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.12); --transition: .2s ease;
}
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }
.container { max-width: 780px; margin: 0 auto; padding: 0 1rem 4rem; }
.app-header { background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 60%, #7c3aed 100%); color: #fff; padding: 2.5rem 1rem 2rem; text-align: center; margin-bottom: 2rem; box-shadow: var(--shadow-lg); }
.app-header h1 { font-size: clamp(1.4rem, 4vw, 2rem); font-weight: 800; letter-spacing: -.5px; margin-bottom: .4rem; }
.app-header .subtitle { font-size: .9rem; opacity: .85; max-width: 560px; margin: 0 auto; }
.citation { display: inline-block; margin-top: .9rem; font-size: .75rem; background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.25); border-radius: 20px; padding: .25rem .8rem; letter-spacing: .3px; }
.progress-wrap { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 1.1rem 1.4rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 1rem; }
.progress-label { font-size: .8rem; color: var(--muted); white-space: nowrap; min-width: 90px; }
.progress-bar { flex: 1; height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #2563eb, #7c3aed); border-radius: 99px; transition: width .4s ease; }
.progress-pct { font-size: .8rem; font-weight: 700; color: var(--accent); min-width: 38px; text-align: right; }
.card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 1.6rem; margin-bottom: 1.2rem; border: 1px solid var(--border); transition: box-shadow var(--transition); }
.card:hover { box-shadow: var(--shadow-lg); }
.intro-card { text-align: center; padding: 2.5rem 2rem; }
.intro-icon { font-size: 3.5rem; margin-bottom: 1rem; }
.intro-card h2 { font-size: 1.5rem; margin-bottom: .5rem; }
.intro-card p { color: var(--muted); margin-bottom: 1.5rem; max-width: 500px; margin-left: auto; margin-right: auto; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
@media (max-width: 560px) { .form-grid { grid-template-columns: 1fr; } }
.form-field { display: flex; flex-direction: column; gap: .4rem; text-align: left; }
.form-field label { font-size: .83rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
.form-field input { border: 1.5px solid var(--border); border-radius: 8px; padding: .65rem .9rem; font-size: .95rem; font-family: inherit; transition: border-color var(--transition), box-shadow var(--transition); outline: none; color: var(--text); }
.form-field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,.15); }
.form-field input.error { border-color: #ef4444; }
.step-header { background: linear-gradient(135deg, var(--accent-light) 0%, #f5f3ff 100%); border-radius: var(--radius); padding: 1.3rem 1.6rem; margin-bottom: 1.2rem; border: 1px solid #bfdbfe; }
.step-header .step-badge { display: inline-block; font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; background: var(--accent); color: #fff; padding: .2rem .7rem; border-radius: 20px; margin-bottom: .5rem; }
.step-header h2 { font-size: 1.2rem; margin-bottom: .2rem; }
.step-header p { font-size: .87rem; color: var(--muted); }
.section-header { display: flex; align-items: flex-start; gap: .9rem; margin-bottom: 1rem; }
.section-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.section-header h3 { font-size: 1rem; font-weight: 700; }
.section-header .dim-tag { font-size: .7rem; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; opacity: .7; margin-top: 2px; }
.section-header p { font-size: .83rem; color: var(--muted); }
.question-item { margin-bottom: 1.2rem; padding-bottom: 1.2rem; border-bottom: 1px solid var(--border); }
.question-item:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
.question-text { font-size: .93rem; font-weight: 500; margin-bottom: .75rem; }
.likert-row { display: flex; gap: .5rem; flex-wrap: wrap; }
.likert-btn { flex: 1; min-width: 80px; border: 1.5px solid var(--border); background: var(--surface); border-radius: 8px; padding: .45rem .3rem; font-size: .75rem; cursor: pointer; text-align: center; transition: border-color var(--transition), background var(--transition), transform var(--transition); font-family: inherit; color: var(--muted); line-height: 1.3; }
.likert-btn:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }
.likert-btn.selected { border-color: var(--accent); background: var(--accent); color: #fff; font-weight: 600; }
.likert-btn .val { display: block; font-size: 1.1rem; font-weight: 700; margin-bottom: 2px; }
@media (max-width: 520px) { .likert-row { gap: .3rem; } .likert-btn { min-width: 56px; font-size: .68rem; } }
.nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem; gap: 1rem; }
.btn { display: inline-flex; align-items: center; gap: .5rem; padding: .7rem 1.6rem; border-radius: 8px; font-size: .9rem; font-weight: 600; border: none; cursor: pointer; font-family: inherit; transition: background var(--transition), transform var(--transition), box-shadow var(--transition); }
.btn:active { transform: scale(.98); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #1d4ed8; box-shadow: 0 4px 12px rgba(37,99,235,.3); }
.btn-primary:disabled { background: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-secondary { background: var(--border); color: var(--text); }
.btn-secondary:hover { background: #cbd5e1; }
.btn-lg { padding: .9rem 2.2rem; font-size: 1rem; }
.results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
@media (max-width: 560px) { .results-grid { grid-template-columns: 1fr; } }
.score-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 1.6rem; border: 1px solid var(--border); text-align: center; }
.score-card .label { font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin-bottom: .3rem; }
.score-card .name { font-size: 1.1rem; font-weight: 700; margin-bottom: 1rem; color: var(--text); word-break: break-word; }
.gauge-wrap { position: relative; width: 120px; height: 64px; margin: 0 auto 1rem; }
.gauge-score { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); font-size: 1.5rem; font-weight: 800; }
.rating-badge { display: inline-flex; align-items: center; gap: .4rem; padding: .3rem .9rem; border-radius: 20px; font-size: .82rem; font-weight: 700; color: #fff; margin-bottom: .5rem; }
.breakdown-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 1.4rem; margin-bottom: 1.2rem; border: 1px solid var(--border); }
.breakdown-card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 1rem; }
.bar-item { margin-bottom: .9rem; }
.bar-item:last-child { margin-bottom: 0; }
.bar-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: .3rem; }
.bar-label { font-size: .83rem; font-weight: 600; }
.bar-score { font-size: .83rem; font-weight: 700; }
.bar-bg { height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 99px; transition: width 1.2s cubic-bezier(.23,1,.32,1); }
.bar-dim { font-size: .7rem; color: var(--muted); margin-top: 2px; }
.dim-summary { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 1.4rem; margin-bottom: 1.2rem; border: 1px solid var(--border); }
.dim-summary h3 { font-size: 1rem; font-weight: 700; margin-bottom: 1rem; }
.dim-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: .8rem; }
@media (max-width: 480px) { .dim-row { grid-template-columns: 1fr; } }
.dim-cell { background: var(--bg); border-radius: 8px; padding: .9rem; text-align: center; border: 1px solid var(--border); }
.dim-cell .dim-icon { font-size: 1.6rem; margin-bottom: .3rem; }
.dim-cell .dim-name { font-size: .75rem; font-weight: 700; margin-bottom: .3rem; color: var(--text); }
.dim-cell .dim-score { font-size: 1.3rem; font-weight: 800; }
.dim-cell .dim-rating { font-size: .7rem; color: var(--muted); margin-top: 2px; }
.footer-note { background: #f1f5f9; border-radius: var(--radius); padding: 1.2rem 1.4rem; border: 1px solid var(--border); margin-top: 1.5rem; font-size: .8rem; color: var(--muted); line-height: 1.7; }
.footer-note strong { color: var(--text); }
.restart-row { text-align: center; margin-top: 1.5rem; }
.hidden { display: none !important; }
.error-msg { color: #ef4444; font-size: .82rem; margin-top: .3rem; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeIn .35s ease forwards; }

/* ─── Google Sheets ──────────────────────────────────────────────── */
.gs-save-row{display:flex;justify-content:center;margin:1.2rem 0 1.5rem}
.btn-gs{display:inline-flex;align-items:center;gap:.5rem;padding:.65rem 1.4rem;border-radius:8px;font-size:.88rem;font-weight:600;border:none;cursor:pointer;font-family:inherit;transition:background .2s,transform .2s}

/* ─── Diagnosis ──────────────────────────────────────────────────── */

.diag-profile-badge{display:inline-flex;align-items:center;padding:.3rem .9rem;border-radius:20px;font-size:.82rem;font-weight:700;color:#fff;margin-bottom:.65rem}
.diag-profile-text{font-size:.87rem;color:var(--text);line-height:1.65}

.diag-factor-item:last-child{margin-bottom:0}
.diag-factor-score{font-size:.9rem;font-weight:800;min-width:32px;text-align:center;padding-top:2px}
.diag-factor-label{font-size:.82rem;font-weight:700;margin-bottom:.12rem}
.diag-factor-tag{display:inline-block;font-size:.63rem;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--muted);border:1px solid var(--border);border-radius:3px;padding:0 .3rem;margin-left:.3rem;vertical-align:middle}
.diag-factor-text{font-size:.79rem;color:var(--muted);line-height:1.5;margin-top:.2rem}
.diag-factor-rec{font-size:.77rem;color:#1d4ed8;font-weight:600;margin-top:.3rem;padding:.3rem .55rem;background:#eff6ff;border-radius:5px;border-left:2px solid #3b82f6;line-height:1.45}
.diag-obs-note{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:.75rem;margin-bottom:.55rem}
.diag-obs-note:last-child{margin-bottom:0}
.diag-obs-title{font-size:.8rem;font-weight:700;color:#15803d;margin-bottom:.35rem}
.diag-obs-note details summary{font-size:.78rem;color:#16a34a;cursor:pointer;font-weight:600;user-select:none}
.diag-obs-note details p{font-size:.76rem;color:#374151;line-height:1.55;margin-top:.4rem;white-space:pre-wrap;word-break:break-word;max-height:220px;overflow-y:auto}
.diag-loading{font-size:.82rem;color:var(--muted);font-style:italic;padding:.3rem 0}
  </style>
</head>
<body>
<div id="app"></div>
<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
const LIKERT = [
  { value: 1, label: "Discordo totalmente" },
  { value: 2, label: "Discordo" },
  { value: 3, label: "Neutro" },
  { value: 4, label: "Concordo" },
  { value: 5, label: "Concordo totalmente" },
];

const PERSONAL_SECTIONS = [
  { id: "principles", dimension: "Interações com Clientes", label: "Princípios Pessoais", color: "#2563eb",
    description: "Ética, integridade e conduta no trato com pessoas.",
    questions: ["Mantenho padrões éticos elevados em todas as minhas interações.","Trato cada pessoa com respeito e equidade.","Sou honesto(a) e transparente no exercício das minhas funções.","Cumpro compromissos assumidos mesmo em situações adversas."] },
  { id: "propitiousness", dimension: "Interações com Clientes", label: "Propiciedade", color: "#7c3aed",
    description: "Adaptação do comportamento ao contexto e às pessoas.",
    questions: ["Adapto minha conduta conforme o perfil e as necessidades de cada cliente.","Percebo sinais sociais e ajusto minha abordagem de forma adequada.","Apresento-me de maneira profissional em qualquer situação.","Antecipo as necessidades dos clientes antes que elas sejam expressas."] },
  { id: "leadership", dimension: "Liderança Organizacional", label: "Liderança Pessoal", color: "#0891b2",
    description: "Iniciativa, influência positiva e exemplo no ambiente de trabalho.",
    questions: ["Tomo iniciativa quando surgem problemas no trabalho.","Motivo e inspiro as pessoas ao meu redor.","Sirvo de exemplo positivo para meus colegas.","Oriento colegas menos experientes com paciência e clareza."] },
  { id: "riskTaker", dimension: "Liderança Organizacional", label: "Disposição para Inovar", color: "#d97706",
    description: "Abertura a ideias novas e disposição para correr riscos calculados.",
    questions: ["Sinto-me confortável em propor ideias e abordagens inovadoras.","Encaro mudanças e novos desafios com entusiasmo.","Estou disposto(a) a correr riscos calculados para melhorar resultados.","Proponho melhorias mesmo quando há resistência do ambiente."] },
  { id: "accuracy", dimension: "Clima de Trabalho", label: "Precisão e Qualidade", color: "#059669",
    description: "Atenção a detalhes e compromisso com excelência.",
    questions: ["Presto atenção cuidadosa aos detalhes do meu trabalho.","Garanto que meu trabalho atenda a padrões elevados de qualidade.","Verifico meu próprio trabalho para minimizar erros.","Busco consistência e exatidão nas minhas entregas."] },
  { id: "composure", dimension: "Clima de Trabalho", label: "Equilíbrio Emocional", color: "#dc2626",
    description: "Serenidade e profissionalismo em situações de pressão.",
    questions: ["Mantenho a calma mesmo sob pressão intensa.","Lido com situações difíceis com profissionalismo.","Administro o estresse de forma eficaz no ambiente de trabalho.","Ofereço soluções tranquilas mesmo diante de conflitos."] },
];

const ORG_SECTIONS = [
  { id: "mgmtPrinciples", dimension: "Liderança Organizacional", label: "Princípios de Gestão", color: "#2563eb",
    description: "Ética e transparência da liderança da empresa.",
    questions: ["A gestão demonstra padrões éticos claros e consistentes.","A liderança comunica-se de forma eficaz e transparente com os colaboradores.","A empresa apoia ativamente o desenvolvimento profissional dos funcionários.","As decisões gerenciais são justas e bem fundamentadas."] },
  { id: "customerRelationships", dimension: "Interações com Clientes", label: "Relacionamento com Clientes", color: "#7c3aed",
    description: "Foco e qualidade no atendimento ao cliente.",
    questions: ["A empresa prioriza a satisfação do cliente em todas as suas operações.","Existem processos eficazes de atendimento ao cliente.","A empresa coleta e age sobre o feedback dos clientes.","Os funcionários são treinados para superar as expectativas dos clientes."] },
  { id: "jobVariety", dimension: "Clima de Trabalho", label: "Variedade de Funções", color: "#0891b2",
    description: "Diversidade de tarefas e possibilidades de aprendizado.",
    questions: ["Os colaboradores possuem variedade de tarefas e responsabilidades.","A empresa incentiva o aprendizado em diferentes áreas.","Os papéis na empresa são dinâmicos e permitem crescimento.","Os funcionários têm oportunidades de atuar em projetos variados."] },
  { id: "jobSatisfaction", dimension: "Clima de Trabalho", label: "Satisfação no Trabalho", color: "#d97706",
    description: "Reconhecimento, engajamento e bem-estar dos funcionários.",
    questions: ["Os colaboradores são reconhecidos e recompensados pelo bom desempenho.","A empresa promove um ambiente de trabalho positivo.","Os funcionários sentem-se valorizados e engajados.","Há um equilíbrio saudável entre vida pessoal e profissional."] },
  { id: "orgLeadership", dimension: "Liderança Organizacional", label: "Liderança Organizacional", color: "#059669",
    description: "Acessibilidade, justiça e desenvolvimento promovidos pela liderança.",
    questions: ["Os líderes são acessíveis e abertos ao diálogo.","As decisões de liderança são transparentes e equitativas.","A liderança investe ativamente no desenvolvimento de suas equipes.","Os gestores servem de modelo de conduta para os colaboradores."] },
  { id: "workplaceClimate", dimension: "Clima de Trabalho", label: "Clima Organizacional", color: "#dc2626",
    description: "Inclusão, colaboração e cultura positiva na empresa.",
    questions: ["O ambiente de trabalho é inclusivo e acolhedor para todos.","Os colaboradores se apoiam mutuamente e trabalham em equipe.","A empresa mantém uma cultura organizacional positiva e saudável.","Novos funcionários são bem recebidos e integrados com cuidado."] },
];

const RATING_BANDS = [
  { min: 0,  max: 20,  label: "Muito Baixo", color: "#ef4444", emoji: "⛔" },
  { min: 20, max: 40,  label: "Baixo",       color: "#f97316", emoji: "⚠️" },
  { min: 40, max: 60,  label: "Moderado",    color: "#eab308", emoji: "🔶" },
  { min: 60, max: 80,  label: "Bom",         color: "#22c55e", emoji: "✅" },
  { min: 80, max: 101, label: "Excelente",   color: "#2563eb", emoji: "⭐" },
];

const DIMENSIONS = ["Interações com Clientes", "Liderança Organizacional", "Clima de Trabalho"];
const DIM_ICONS  = { "Interações com Clientes": "🤝", "Liderança Organizacional": "🏆", "Clima de Trabalho": "🌱" };

// ─── STATE ───────────────────────────────────────────────────────────────────
const state = {
  step: 0, personName: "", companyName: "",
  personalAnswers: {}, orgAnswers: {},
  currentSectionIdx: 0, mode: "personal",
};

// ─── UTILS ───────────────────────────────────────────────────────────────────
function getRating(score) {
  return RATING_BANDS.find(b => score >= b.min && score < b.max) || RATING_BANDS[RATING_BANDS.length - 1];
}
function calcScore(vals) {
  if (!vals.length) return 0;
  return Math.round((vals.reduce((a,b) => a+b, 0) / (vals.length * 5)) * 100);
}
function calcGroupScore(sections, answers) {
  return calcScore(sections.flatMap(s =>
    s.questions.map((_,i) => answers[`${s.id}-${i}`]).filter(v => v !== undefined)
  ));
}
function calcSectionScore(sections, answers, id) {
  const s = sections.find(x => x.id === id);
  return calcScore(s.questions.map((_,i) => answers[`${id}-${i}`]).filter(v => v !== undefined));
}
function completedSections() {
  const pd = PERSONAL_SECTIONS.filter(s => s.questions.every((_,i) => state.personalAnswers[`${s.id}-${i}`] !== undefined)).length;
  const od = ORG_SECTIONS.filter(s => s.questions.every((_,i) => state.orgAnswers[`${s.id}-${i}`] !== undefined)).length;
  return pd + od;
}

// ─── DOM HELPERS ─────────────────────────────────────────────────────────────
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === "class") el.className = v;
    else if (k === "style") el.style.cssText = v;
    else if (k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(), v);
    else el.setAttribute(k, v);
  });
  children.flat().forEach(c => {
    if (c == null) return;
    el.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  });
  return el;
}

// ─── GAUGE ───────────────────────────────────────────────────────────────────
function buildGauge(score, color) {
  const R = 54, cx = 60, cy = 60, circ = Math.PI * R;
  const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  svg.setAttribute("viewBox", "6 6 108 60");
  svg.setAttribute("width", "120"); svg.setAttribute("height", "64");
  function arc(stroke, dasharray) {
    const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
    p.setAttribute("d", `M${cx-R},${cy} a${R},${R} 0 0,1 ${2*R},0`);
    p.setAttribute("fill","none"); p.setAttribute("stroke", stroke);
    p.setAttribute("stroke-width","10"); p.setAttribute("stroke-linecap","round");
    if (dasharray) p.setAttribute("stroke-dasharray", dasharray);
    return p;
  }
  const fg = arc(color, `0 ${circ}`);
  svg.appendChild(arc("#e2e8f0")); svg.appendChild(fg);
  setTimeout(() => fg.setAttribute("stroke-dasharray", `${circ*(score/100)} ${circ}`), 60);
  const scoreEl = document.createElement("div");
  scoreEl.className = "gauge-score"; scoreEl.style.color = color; scoreEl.textContent = score;
  const wrap = document.createElement("div");
  wrap.className = "gauge-wrap"; wrap.appendChild(svg); wrap.appendChild(scoreEl);
  return wrap;
}

function getFactorDiagText(id, score) {
  var t = FACTOR_TEXTS[id];
  if (!t) return { analysis: '', rec: '' };
  var analysis = score >= 70 ? t.high : score >= 50 ? t.mid : t.low;
  return { analysis: analysis, rec: score < 70 ? t.rec : '' };
}

function getProfileInfo(ps, cs) {
  var hp = ps >= 65, ho = cs >= 65;
  if (hp && ho) return { label: 'Hospitalidade Consolidada', color: '#16a34a',
    text: 'Você apresenta atributos pessoais sólidos e uma cultura organizacional bem desenvolvida. Esse alinhamento entre quem você é e o ambiente onde atua é o que permite criar experiências de hospitalidade genuínas, consistentes e memoráveis — não por obrigação, mas por convicção.' };
  if (hp && !ho) return { label: 'Talento em Ambiente Desafiador', color: '#d97706',
    text: 'Seus atributos pessoais são sólidos, mas o ambiente organizacional ainda não oferece as condições ideais para você expressar seu potencial pleno. Concentre energia em influenciar a cultura ao seu redor — profissionais como você são os agentes de mudança que as organizações mais precisam.' };
  if (!hp && ho) return { label: 'Potencial a Desenvolver', color: '#0891b2',
    text: 'Você está num ambiente favorável — aproveite essa vantagem para investir no seu desenvolvimento pessoal. A organização oferece estrutura e suporte; cabe a você desenvolver as competências individuais que vão elevar sua contribuição para a cultura de hospitalidade.' };
  return { label: 'Jornada de Transformação', color: '#7c3aed',
    text: 'Tanto os atributos pessoais quanto a cultura organizacional têm espaço significativo para crescimento. Encare isso como uma oportunidade real de transformação — comece pelos fatores de maior impacto e avance de forma consistente. Pequenas melhorias sustentadas criam grandes mudanças.' };
}

function buildDiagnosis(ps, cs, factorScores) {
  var profile = getProfileInfo(ps, cs);

  var factorsRanked = FACTOR_META.map(function(f) {
    return { meta: f, score: factorScores[f.id] || 0 };
  }).sort(function(a, b) { return b.score - a.score; });

  var strengths = factorsRanked.filter(function(f) { return f.score >= 70; });
  var gaps      = factorsRanked.filter(function(f) { return f.score < 55; });

  function factorItem(f) {
    var t   = getFactorDiagText(f.meta.id, f.score);
    var rat = getRating(f.score);
    var typeLabel = f.meta.type === 'personal' ? 'Pessoal' : 'Org.';
    return h('div', { class: 'diag-factor-item' },
      h('div', { class: 'diag-factor-score', style: 'color:' + rat.color }, String(f.score)),
      h('div', { style: 'flex:1' },
        h('div', { class: 'diag-factor-label' }, f.meta.label,
          h('span', { class: 'diag-factor-tag' }, typeLabel)
        ),
        h('div', { class: 'diag-factor-text' }, t.analysis),
        t.rec ? h('div', { class: 'diag-factor-rec' }, '→ ' + t.rec) : null
      )
    );
  }

  var profileSection = h('div', { class: 'diag-section' },
    h('div', { class: 'diag-section-title' }, 'Perfil Geral'),
    h('div', { class: 'diag-profile-badge', style: 'background:' + profile.color }, profile.label),
    h('p', { class: 'diag-profile-text' }, profile.text)
  );

  var strengthsSection = strengths.length
    ? h('div', { class: 'diag-section' },
        h('div', { class: 'diag-section-title' }, '✅ Pontos Fortes (' + strengths.length + ')'),
        ...strengths.map(factorItem)
      )
    : null;

  var gapsSection = gaps.length
    ? h('div', { class: 'diag-section' },
        h('div', { class: 'diag-section-title' }, '📈 Áreas de Desenvolvimento (' + gaps.length + ')'),
        ...gaps.map(factorItem)
      )
    : null;

  var obsContent = h('div', { id: 'obsidianContent' },
    h('div', { class: 'diag-loading' }, '📂 Clique em "Salvar" abaixo para carregar as notas do vault baseconhecimento_hosp…')
  );
  var obsSection = h('div', { class: 'diag-section', id: 'obsidianSection' },
    h('div', { class: 'diag-section-title' }, '📚 Notas do Vault (baseconhecimento_hosp)'),
    obsContent
  );

  return h('div', { class: 'diag-card fade-in' },
    h('h3', {}, '🔍 Diagnóstico e Recomendações'),
    profileSection,
    strengthsSection,
    gapsSection,
    obsSection
  );
}

function showObsidianNotes(notes) {
  var el = document.getElementById('obsidianContent');
  if (!el) return;
  el.innerHTML = '';
  if (!notes || !notes.length) {
    el.textContent = 'Nenhuma nota encontrada em baseconhecimento_hosp.';
    return;
  }
  notes.forEach(function(note) {
    var wrap = document.createElement('div');
    wrap.className = 'diag-obs-note';
    var title = document.createElement('div');
    title.className = 'diag-obs-title';
    title.textContent = note.name;
    var details = document.createElement('details');
    var summary = document.createElement('summary');
    summary.textContent = 'Ver conteúdo';
    var body = document.createElement('p');
    body.textContent = note.content;
    details.appendChild(summary);
    details.appendChild(body);
    wrap.appendChild(title);
    wrap.appendChild(details);
    el.appendChild(wrap);
  });
}

// ─── RENDER QUESTIONS ────────────────────────────────────────────────────────
function renderQuestions() {
  const isPersonal = state.mode === "personal";
  const sections = isPersonal ? PERSONAL_SECTIONS : ORG_SECTIONS;
  const answers  = isPersonal ? state.personalAnswers : state.orgAnswers;
  const section  = sections[state.currentSectionIdx];
  const totalS   = PERSONAL_SECTIONS.length + ORG_SECTIONS.length;
  const globalIdx = isPersonal ? state.currentSectionIdx : PERSONAL_SECTIONS.length + state.currentSectionIdx;
  const pct = Math.round((completedSections() / totalS) * 100);

  function saveAnswer(secId, qi, val) {
    (isPersonal ? state.personalAnswers : state.orgAnswers)[`${secId}-${qi}`] = val;
    render();
  }
  function canAdvance() {
    return section.questions.every((_,i) => answers[`${section.id}-${i}`] !== undefined);
  }
  function goNext() {
    if (!canAdvance()) return;
    if (state.currentSectionIdx < sections.length - 1) { state.currentSectionIdx++; }
    else if (isPersonal) { state.mode = "org"; state.currentSectionIdx = 0; }
    else { state.step = 3; }
    render(); window.scrollTo(0,0);
  }
  function goBack() {
    if (state.currentSectionIdx > 0) { state.currentSectionIdx--; }
    else if (!isPersonal) { state.mode = "personal"; state.currentSectionIdx = PERSONAL_SECTIONS.length - 1; }
    else { state.step = 0; }
    render(); window.scrollTo(0,0);
  }

  const qItems = section.questions.map((q, i) => {
    const cur = answers[`${section.id}-${i}`];
    return h("div", { class:"question-item" },
      h("div", { class:"question-text" }, `${i+1}. ${q}`),
      h("div", { class:"likert-row" },
        ...LIKERT.map(opt =>
          h("button", {
            class: `likert-btn${cur === opt.value ? " selected" : ""}`,
            onClick() { saveAnswer(section.id, i, opt.value); }
          }, h("span", { class:"val" }, String(opt.value)), opt.label)
        )
      )
    );
  });

  const nextLabel = globalIdx + 1 === totalS ? "Ver Resultado →" : "Próximo →";
  const nextBtn = h("button", {
    class: "btn btn-primary",
    ...(canAdvance() ? {} : { disabled: "" }),
    onClick: goNext
  }, nextLabel);

  return h("div", {},
    h("div", { class:"progress-wrap" },
      h("span", { class:"progress-label" }, "Progresso"),
      h("div", { class:"progress-bar" }, h("div", { class:"progress-fill", style:`width:${pct}%` })),
      h("span", { class:"progress-pct" }, `${pct}%`)
    ),
    h("div", { class:"step-header" },
      h("div", { class:"step-badge" },
        isPersonal ? `Parte 1 de 2 · Atributos Pessoais (${state.personName})`
                   : `Parte 2 de 2 · Cultura Organizacional (${state.companyName})`
      ),
      h("h2", {}, isPersonal ? "Avalie os atributos pessoais" : "Avalie a cultura da empresa"),
      h("p", {}, isPersonal
        ? "Responda com base no comportamento habitual desta pessoa no ambiente de trabalho."
        : "Responda com base na sua percepção geral sobre a empresa e sua cultura."
      )
    ),
    h("div", { class:"card fade-in" },
      h("div", { class:"section-header" },
        h("div", { class:"section-dot", style:`background:${section.color}` }),
        h("div", {},
          h("div", { class:"dim-tag" }, section.dimension),
          h("h3", {}, section.label),
          h("p", {}, section.description)
        )
      ),
      ...qItems,
      h("div", { class:"nav-row" },
        h("button", { class:"btn btn-secondary", onClick: goBack }, "← Voltar"),
        h("div", { style:"font-size:.8rem;color:var(--muted);text-align:center" }, `${globalIdx+1} / ${totalS}`),
        nextBtn
      )
    )
  );
}

// ─── RENDER RESULTS ───────────────────────────────────────────────────────────
function renderResults() {
  const ps = calcGroupScore(PERSONAL_SECTIONS, state.personalAnswers);
  const cs = calcGroupScore(ORG_SECTIONS, state.orgAnswers);
  const pr = getRating(ps), cr = getRating(cs);

  // Compute all factor scores
  var factorScores = {};
  FACTOR_META.forEach(function(f) {
    var secs = f.type === 'personal' ? PERSONAL_SECTIONS : ORG_SECTIONS;
    var ans  = f.type === 'personal' ? state.personalAnswers : state.orgAnswers;
    factorScores[f.id] = calcSectionScore(secs, ans, f.id);
  });

  function buildBreakdown(sections, answers, title) {
    const bars = sections.map(s => {
      const sc = calcSectionScore(sections, answers, s.id);
      const rat = getRating(sc);
      return h("div", { class:"bar-item" },
        h("div", { class:"bar-top" },
          h("span", { class:"bar-label" }, s.label),
          h("span", { class:"bar-score", style:`color:${rat.color}` }, `${sc}`)
        ),
        h("div", { class:"bar-bg" }, h("div", { class:"bar-fill", style:`width:0%;background:${s.color}` })),
        h("div", { class:"bar-dim" }, s.dimension)
      );
    });
    const card = h("div", { class:"breakdown-card fade-in" }, h("h3", {}, title), ...bars);
    setTimeout(() => {
      const fills = card.querySelectorAll(".bar-fill");
      sections.forEach((s,i) => { fills[i].style.width = `${calcSectionScore(sections, answers, s.id)}%`; });
    }, 100);
    return card;
  }

  function buildDimSummary() {
    const cells = DIMENSIONS.map(dim => {
      const allSecs = [...PERSONAL_SECTIONS, ...ORG_SECTIONS].filter(s => s.dimension === dim);
      const allVals = allSecs.flatMap(s => {
        const a = PERSONAL_SECTIONS.includes(s) ? state.personalAnswers : state.orgAnswers;
        return s.questions.map((_,i) => a[`${s.id}-${i}`]).filter(v => v !== undefined);
      });
      const sc = calcScore(allVals), rat = getRating(sc);
      return h("div", { class:"dim-cell" },
        h("div", { class:"dim-icon" }, DIM_ICONS[dim]),
        h("div", { class:"dim-name" }, dim),
        h("div", { class:"dim-score", style:`color:${rat.color}` }, `${sc}`),
        h("div", { class:"dim-rating" }, rat.label)
      );
    });
    return h("div", { class:"dim-summary fade-in" },
      h("h3", {}, "Resultado por Dimensão Principal (HCS)"),
      h("div", { class:"dim-row" }, ...cells)
    );
  }

  const noteEl = h("div", { class:"footer-note" });
  noteEl.innerHTML = `
    <strong>Interpretação da escala:</strong><br>
    ${RATING_BANDS.map(b => `<span style="color:${b.color};font-weight:700">${b.emoji} ${b.label} (${b.min}–${b.min===80?100:b.max})</span>`).join(" &nbsp;·&nbsp; ")}<br><br>
    A pontuação é calculada a partir de uma escala Likert de 5 pontos (1&nbsp;=&nbsp;Discordo totalmente, 5&nbsp;=&nbsp;Concordo totalmente), convertida para 0–100.
    Os dez fatores refletem os construtos identificados por Dawson, Abbott &amp; Shoemaker (2011) por meio de análise de componentes principais (n = 741).<br><br>
    <strong>Referência:</strong> Dawson, M., Abbott, J., &amp; Shoemaker, S. (2011). The Hospitality Culture Scale.
    <em>International Journal of Hospitality Management</em>, 30(2), 290–300.
    <a href="https://doi.org/10.1016/j.ijhm.2010.10.005" target="_blank" rel="noopener">doi:10.1016/j.ijhm.2010.10.005</a>
  `;

  return h("div", {},
    h("div", { class:"results-grid" },
      h("div", { class:"score-card fade-in" },
        h("div", { class:"label" }, "Pessoa"),
        h("div", { class:"name" }, state.personName),
        buildGauge(ps, pr.color),
        h("div", { class:"rating-badge", style:`background:${pr.color}` }, pr.emoji, " ", pr.label),
        h("div", { style:"font-size:.78rem;color:var(--muted);margin-top:.3rem" }, "Atributos pessoais de hospitalidade")
      ),
      h("div", { class:"score-card fade-in" },
        h("div", { class:"label" }, "Empresa"),
        h("div", { class:"name" }, state.companyName),
        buildGauge(cs, cr.color),
        h("div", { class:"rating-badge", style:`background:${cr.color}` }, cr.emoji, " ", cr.label),
        h("div", { style:"font-size:.78rem;color:var(--muted);margin-top:.3rem" }, "Cultura organizacional de hospitalidade")
      )
    ),
    buildDimSummary(),
    buildDiagnosis(ps, cs, factorScores),
    buildBreakdown(PERSONAL_SECTIONS, state.personalAnswers, `Fatores Pessoais — ${state.personName}`),
    buildBreakdown(ORG_SECTIONS, state.orgAnswers, `Fatores Organizacionais — ${state.companyName}`),
    noteEl,
    h("div", { class:"gs-save-row" },
      h("button", { class:"btn-gs btn-gs-save", onClick: gsSaveDawson }, "Salvar")
    ),
    h("div", { class:"restart-row" },
      h("button", { class:"btn btn-secondary", onClick() {
        Object.assign(state, { step:0, personName:"", companyName:"", personalAnswers:{}, orgAnswers:{}, currentSectionIdx:0, mode:"personal" });
        render(); window.scrollTo(0,0);
      }}, "↩ Nova Avaliação")
    )
  );
}

// ─── MAIN RENDER ─────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  app.appendChild(
    h("header", { class:"app-header" },
      h("h1", {}, "🏨 Avaliação de Hospitalidade"),
      h("p", { class:"subtitle" }, "Baseado na Hospitality Culture Scale — mede atributos pessoais e cultura organizacional"),
      h("span", { class:"citation" }, "Dawson, Abbott & Shoemaker · Int. J. Hospitality Management · 2011")
    )
  );
  const container = h("div", { class:"container" });
  if (state.step === 0) container.appendChild(renderIntro());
  else if (state.step <= 2) container.appendChild(renderQuestions());
  else container.appendChild(renderResults());
  app.appendChild(container);
}

// ─── Google Sheets Integration ────────────────────────────────────────────────
var GS_URL = 'https://script.google.com/macros/s/AKfycbxhsOG5I0wkOtyX4WUI-OkNIDXa3PXroUW9kFbq4OmSwKTgL1Zgy9U172M92eDJuPm5/exec';

function gsToast(msg, type) {
  var t = document.getElementById('gsToast');
  if (!t) return;
  t.textContent = msg;
  t.className = 'gs-toast gs-toast--show' + (type ? ' gs-toast--' + type : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(function() { t.className = 'gs-toast'; }, 4000);
}

function gsSaveDawson() {
  var ps = calcGroupScore(PERSONAL_SECTIONS, state.personalAnswers);
  var cs = calcGroupScore(ORG_SECTIONS, state.orgAnswers);
  var factors = {};
  FACTOR_META.forEach(function(f) {
    var secs = f.type === 'personal' ? PERSONAL_SECTIONS : ORG_SECTIONS;
    var ans  = f.type === 'personal' ? state.personalAnswers : state.orgAnswers;
    factors[f.id] = calcSectionScore(secs, ans, f.id);
  });
  var data = { app: 'dawson', personName: state.personName, companyName: state.companyName,
    personScore: ps, personRating: getRating(ps).label,
    companyScore: cs, companyRating: getRating(cs).label, factors: factors };

  gsToast('Salvando…', '');
  fetch(GS_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(data) })
    .then(function() {
      gsToast('✅ Salvo na planilha!', 'success');
      loadObsidianNotes();
    })
    .catch(function() { gsToast('❌ Falha de rede.', 'error'); });
}

function loadObsidianNotes() {
  var el = document.getElementById('obsidianContent');
  if (el) el.innerHTML = '<div class="diag-loading">Carregando notas do vault…</div>';

  fetch(GS_URL + '?action=vault')
    .then(function(r) { return r.json(); })
    .then(function(data) { showObsidianNotes(data.notes || []); })
    .catch(function() {
      var el2 = document.getElementById('obsidianContent');
      if (el2) el2.innerHTML = '<p style="font-size:.8rem;color:#dc2626">⚠️ Não foi possível carregar o vault. Confirme que o Apps Script foi atualizado e reimplantado com a nova versão (que inclui a função doGet).</p>';
    });
}

document.addEventListener("DOMContentLoaded", render);
</script>
<div class="gs-toast" id="gsToast"></div>
</body>
